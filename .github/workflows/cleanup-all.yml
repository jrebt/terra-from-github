name: 'Cleanup All OVH Resources'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "cleanup" para confirmar la eliminacion de TODOS los recursos'
        required: true
        default: ''

jobs:
  cleanup:
    name: 'Destroy all OpenStack resources'
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'cleanup'

    env:
      OS_AUTH_URL: "https://auth.cloud.ovh.net/v3"
      OS_DOMAIN_NAME: "default"
      OS_TENANT_ID: ${{ secrets.OPENSTACK_TENANT_ID }}
      OS_USERNAME: ${{ secrets.OPENSTACK_USERNAME }}
      OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
      OS_REGION_NAME: "GRA11"
      CLUSTER_NAME: "k3s-prod"

    steps:
      - name: Install OpenStack CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-openstackclient

      - name: List existing resources
        run: |
          echo "=== Servers ==="
          openstack server list -f table || true
          echo "=== Floating IPs ==="
          openstack floating ip list -f table || true
          echo "=== Routers ==="
          openstack router list -f table || true
          echo "=== Networks ==="
          openstack network list -f table || true
          echo "=== Security Groups ==="
          openstack security group list -f table || true
          echo "=== Keypairs ==="
          openstack keypair list -f table || true

      - name: Delete ALL servers (VMs)
        run: |
          for server in $(openstack server list -f value -c ID); do
            NAME=$(openstack server show "$server" -f value -c name 2>/dev/null || echo "$server")
            echo "Deleting server: $NAME ($server)"
            openstack server delete --wait "$server" || true
          done
          echo "Waiting for servers to be fully deleted..."
          sleep 10

      - name: Delete ALL floating IPs
        run: |
          for fip in $(openstack floating ip list -f value -c ID); do
            echo "Deleting floating IP: $fip"
            openstack floating ip delete "$fip" || true
          done

      - name: Delete ALL routers
        run: |
          for router in $(openstack router list -f value -c ID); do
            NAME=$(openstack router show "$router" -f value -c name 2>/dev/null || echo "$router")
            echo "Processing router: $NAME ($router)"
            for port in $(openstack port list --router "$router" -f value -c ID 2>/dev/null); do
              echo "  Removing port $port from router"
              openstack router remove port "$router" "$port" || true
            done
            echo "  Deleting router: $NAME"
            openstack router delete "$router" || true
          done

      - name: Delete ALL private networks and subnets
        run: |
          for net in $(openstack network list -f value -c ID -c Name | grep -v "Ext-Net" | awk '{print $1}'); do
            NAME=$(openstack network show "$net" -f value -c name 2>/dev/null || echo "$net")
            for port in $(openstack port list --network "$net" -f value -c ID 2>/dev/null); do
              echo "  Deleting port $port on network $NAME"
              openstack port delete "$port" || true
            done
            for subnet in $(openstack subnet list --network "$net" -f value -c ID); do
              echo "  Deleting subnet: $subnet"
              openstack subnet delete "$subnet" || true
            done
            echo "Deleting network: $NAME ($net)"
            openstack network delete "$net" || true
          done

      - name: Delete ALL custom security groups
        run: |
          for sg in $(openstack security group list -f value -c ID -c Name | grep -v "default" | awk '{print $1}'); do
            NAME=$(openstack security group show "$sg" -f value -c name 2>/dev/null || echo "$sg")
            echo "Deleting security group: $NAME ($sg)"
            openstack security group delete "$sg" || true
          done

      - name: Delete ALL keypairs
        run: |
          for kp in $(openstack keypair list -f value -c Name); do
            echo "Deleting keypair: $kp"
            openstack keypair delete "$kp" || true
          done

      - name: Verify cleanup
        run: |
          echo "=== Remaining Resources ==="
          echo "--- Servers ---"
          openstack server list -f table || true
          echo "--- Floating IPs ---"
          openstack floating ip list -f table || true
          echo "--- Routers ---"
          openstack router list -f table || true
          echo "--- Networks ---"
          openstack network list -f table || true
          echo "--- Security Groups ---"
          openstack security group list -f table || true
          echo "--- Keypairs ---"
          openstack keypair list -f table || true
          echo ""
          echo "Cleanup complete!"
