name: 'Ansible Deploy'

on:
  workflow_dispatch:
    inputs:
      bastion_ip:
        description: 'Bastion public IP (from Terraform output)'
        required: true
      k3s_master_ip:
        description: 'K3s master private IP'
        required: true
        default: '10.0.0.10'
      k3s_floating_ip:
        description: 'K3s floating IP (for web traffic)'
        required: false

jobs:
  ansible:
    name: 'Deploy K3s + ArgoCD + k9s'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./providers/ovh/ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-openstackclient

      - name: Check VM status and security group
        working-directory: .
        env:
          OS_AUTH_URL: "https://auth.cloud.ovh.net/v3"
          OS_DOMAIN_NAME: "default"
          OS_TENANT_ID: ${{ secrets.OPENSTACK_TENANT_ID }}
          OS_USERNAME: ${{ secrets.OPENSTACK_USERNAME }}
          OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
          OS_REGION_NAME: "GRA11"
        run: |
          echo "=== VM Status ==="
          openstack server list -f table -c Name -c Status -c Networks
          echo ""
          echo "=== Security Group Rules (default) ==="
          SG_ID=$(openstack security group show default -f value -c id)
          echo "Default SG ID: $SG_ID"
          openstack security group rule list "$SG_ID" -f table \
            -c Direction -c Protocol -c "Port Range" -c "Remote IP Prefix"
          echo ""
          echo "=== Checking/Adding SSH rule ==="
          SSH_EXISTS=$(openstack security group rule list "$SG_ID" -f value \
            -c Protocol -c "Port Range" -c Direction | grep "tcp.*22:22.*ingress" || echo "")
          if [ -n "$SSH_EXISTS" ]; then
            echo "SSH rule already exists: $SSH_EXISTS"
          else
            echo "Adding SSH rule..."
            openstack security group rule create \
              --ingress --protocol tcp --dst-port 22 --remote-ip 0.0.0.0/0 \
              "$SG_ID" || echo "Warning: Could not add SSH rule (quota?)"
          fi
          HTTP_EXISTS=$(openstack security group rule list "$SG_ID" -f value \
            -c Protocol -c "Port Range" -c Direction | grep "tcp.*80:80.*ingress" || echo "")
          if [ -z "$HTTP_EXISTS" ]; then
            openstack security group rule create \
              --ingress --protocol tcp --dst-port 80 --remote-ip 0.0.0.0/0 \
              "$SG_ID" || echo "Warning: Could not add HTTP rule (quota?)"
          fi
          HTTPS_EXISTS=$(openstack security group rule list "$SG_ID" -f value \
            -c Protocol -c "Port Range" -c Direction | grep "tcp.*443:443.*ingress" || echo "")
          if [ -z "$HTTPS_EXISTS" ]; then
            openstack security group rule create \
              --ingress --protocol tcp --dst-port 443 --remote-ip 0.0.0.0/0 \
              "$SG_ID" || echo "Warning: Could not add HTTPS rule (quota?)"
          fi
          echo "=== Final rules ==="
          openstack security group rule list "$SG_ID" -f table \
            -c Direction -c Protocol -c "Port Range" -c "Remote IP Prefix"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H ${{ github.event.inputs.bastion_ip }} >> ~/.ssh/known_hosts 2>&1 || true

      - name: Generate inventory
        env:
          BASTION_IP: ${{ github.event.inputs.bastion_ip }}
          K3S_IP: ${{ github.event.inputs.k3s_master_ip }}
        run: |
          mkdir -p inventory
          PROXY="ssh -W %h:%p -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new ubuntu@${BASTION_IP}"
          {
            echo "all:"
            echo "  children:"
            echo "    bastion:"
            echo "      hosts:"
            echo "        k3s-prod-bastion:"
            echo "          ansible_host: ${BASTION_IP}"
            echo "          ansible_user: ubuntu"
            echo "    k3s_masters:"
            echo "      hosts:"
            echo "        k3s-prod-master-1:"
            echo "          ansible_host: ${K3S_IP}"
            echo "          ansible_user: ubuntu"
            echo "          ansible_ssh_common_args: \"-o StrictHostKeyChecking=accept-new -o ProxyCommand='${PROXY}'\""
          } > inventory/hosts.yml
          cat inventory/hosts.yml

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for bastion SSH..."
          for i in $(seq 1 20); do
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=5 ubuntu@${{ github.event.inputs.bastion_ip }} \
              "echo OK" && break || sleep 15
          done

      - name: Install K3s
        run: ansible-playbook playbooks/k3s-install.yml

      - name: Configure cluster
        run: ansible-playbook playbooks/cluster-config.yml

      - name: Setup bastion (k9s + kubeconfig)
        run: ansible-playbook playbooks/bastion-setup.yml

      - name: Install ArgoCD
        run: ansible-playbook playbooks/argocd-install.yml
