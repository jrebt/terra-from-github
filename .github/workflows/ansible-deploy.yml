name: 'Ansible Deploy'

on:
  workflow_dispatch:
    inputs:
      bastion_ip:
        description: 'Bastion public IP (from Terraform output)'
        required: true
      k3s_master_ip:
        description: 'K3s master private IP'
        required: true
        default: '10.0.0.10'
      k3s_floating_ip:
        description: 'K3s floating IP (for web traffic)'
        required: false

jobs:
  ansible:
    name: 'Deploy K3s + ArgoCD + k9s'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./providers/ovh/ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-openstackclient

      - name: Open ports in security group
        working-directory: .
        env:
          OS_AUTH_URL: "https://auth.cloud.ovh.net/v3"
          OS_DOMAIN_NAME: "default"
          OS_TENANT_ID: ${{ secrets.OPENSTACK_TENANT_ID }}
          OS_USERNAME: ${{ secrets.OPENSTACK_USERNAME }}
          OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
          OS_REGION_NAME: "GRA11"
        run: |
          SG_ID=$(openstack security group show default -f value -c id)
          echo "Default SG ID: $SG_ID"
          echo "=== Current rules ==="
          openstack security group rule list "$SG_ID" -f table \
            -c id -c Direction -c Ethertype -c Protocol -c "Port Range" -c "Remote IP Prefix"
          echo ""
          echo "=== Freeing quota: removing IPv6 rules ==="
          IPV6_RULES=$(openstack security group rule list "$SG_ID" -f value \
            -c id -c Ethertype | grep -i ipv6 | awk '{print $1}')
          for rule_id in $IPV6_RULES; do
            echo "Deleting IPv6 rule: $rule_id"
            openstack security group rule delete "$rule_id" && echo "  Deleted OK" || echo "  Could not delete"
          done
          echo ""
          echo "=== Adding required rules ==="
          for port in 22 80 443; do
            RULE_EXISTS=$(openstack security group rule list "$SG_ID" -f value \
              -c Protocol -c "Port Range" -c Direction | grep "tcp.*${port}:${port}.*ingress" || true)
            if [ -n "$RULE_EXISTS" ]; then
              echo "Port $port already open"
            else
              openstack security group rule create \
                --ingress --protocol tcp --dst-port $port --remote-ip 0.0.0.0/0 \
                "$SG_ID" && echo "Port $port opened" || echo "Warning: could not open port $port"
            fi
          done
          echo ""
          echo "=== Final rules ==="
          openstack security group rule list "$SG_ID" -f table \
            -c Direction -c Ethertype -c Protocol -c "Port Range" -c "Remote IP Prefix"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H ${{ github.event.inputs.bastion_ip }} >> ~/.ssh/known_hosts 2>&1 || true

      - name: Generate inventory
        env:
          BASTION_IP: ${{ github.event.inputs.bastion_ip }}
          K3S_IP: ${{ github.event.inputs.k3s_master_ip }}
        run: |
          mkdir -p inventory
          PROXY="ssh -W %h:22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new ubuntu@${BASTION_IP}"
          {
            echo "all:"
            echo "  children:"
            echo "    bastion:"
            echo "      hosts:"
            echo "        k3s-prod-bastion:"
            echo "          ansible_host: ${BASTION_IP}"
            echo "          ansible_user: ubuntu"
            echo "    k3s_masters:"
            echo "      hosts:"
            echo "        k3s-prod-master-1:"
            echo "          ansible_host: ${K3S_IP}"
            echo "          ansible_user: ubuntu"
            echo "          ansible_ssh_common_args: \"-o StrictHostKeyChecking=accept-new -o ProxyCommand='${PROXY}'\""
          } > inventory/hosts.yml
          cat inventory/hosts.yml

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for bastion SSH..."
          SSH_OK=0
          for i in $(seq 1 20); do
            echo "Attempt $i/20..."
            if ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 ubuntu@${{ github.event.inputs.bastion_ip }} \
              "echo SSH_CONNECTED"; then
              SSH_OK=1
              break
            fi
            sleep 15
          done
          if [ "$SSH_OK" -eq 0 ]; then
            echo "ERROR: Could not connect to bastion after 20 attempts. Check security group rules."
            exit 1
          fi

      - name: Install K3s
        run: ansible-playbook playbooks/k3s-install.yml

      - name: Configure cluster
        run: ansible-playbook playbooks/cluster-config.yml

      - name: Setup bastion (k9s + kubeconfig)
        run: ansible-playbook playbooks/bastion-setup.yml

      - name: Install ArgoCD
        run: ansible-playbook playbooks/argocd-install.yml
