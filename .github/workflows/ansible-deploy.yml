name: 'Ansible Deploy'

on:
  workflow_dispatch:
    inputs:
      bastion_ip:
        description: 'Bastion public IP (from Terraform output)'
        required: true
      k3s_master_ip:
        description: 'K3s master private IP'
        required: true
        default: '10.0.0.10'
      k3s_floating_ip:
        description: 'K3s floating IP (for web traffic)'
        required: false

jobs:
  ansible:
    name: 'Deploy K3s + ArgoCD + k9s'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./providers/ovh/ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.bastion_ip }} >> ~/.ssh/known_hosts

      - name: Generate inventory
        run: |
          mkdir -p inventory
          cat > inventory/hosts.yml << EOF
          all:
            children:
              bastion:
                hosts:
                  k3s-prod-bastion:
                    ansible_host: ${{ github.event.inputs.bastion_ip }}
                    ansible_user: ubuntu
              k3s_masters:
                hosts:
                  k3s-prod-master-1:
                    ansible_host: ${{ github.event.inputs.k3s_master_ip }}
                    ansible_user: ubuntu
                    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o ProxyJump=ubuntu@${{ github.event.inputs.bastion_ip }}"
          EOF
          cat inventory/hosts.yml

      - name: Wait for SSH to be available
        run: |
          echo "Waiting for bastion SSH..."
          for i in $(seq 1 20); do
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=5 ubuntu@${{ github.event.inputs.bastion_ip }} \
              "echo OK" && break || sleep 15
          done

      - name: Install K3s
        run: ansible-playbook playbooks/k3s-install.yml

      - name: Configure cluster
        run: ansible-playbook playbooks/cluster-config.yml

      - name: Setup bastion (k9s + kubeconfig)
        run: ansible-playbook playbooks/bastion-setup.yml

      - name: Install ArgoCD
        run: ansible-playbook playbooks/argocd-install.yml
