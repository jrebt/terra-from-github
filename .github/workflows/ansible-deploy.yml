name: 'Ansible Deploy'

on:
  workflow_dispatch:
    inputs:
      k3s_master_ip:
        description: 'K3s master private IP'
        required: true
        default: '10.0.0.10'
      k3s_floating_ip:
        description: 'K3s floating IP (for web traffic)'
        required: false

jobs:
  ansible:
    name: 'Deploy K3s + ArgoCD + k9s'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./providers/ovh/ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup Tailscale on runner
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      - name: Wait for bastion on Tailscale
        working-directory: .
        run: |
          echo "Waiting for k3s-prod-bastion to appear on Tailscale..."
          for i in $(seq 1 30); do
            BASTION_IP=$(tailscale status --json 2>/dev/null | \
              jq -r '.Peer | to_entries[] | .value | select(.HostName == "k3s-prod-bastion") | .TailscaleIPs[0]' \
              2>/dev/null || echo "")
            if [ -n "$BASTION_IP" ] && [ "$BASTION_IP" != "null" ]; then
              echo "Bastion found at Tailscale IP: $BASTION_IP"
              echo "BASTION_TS_IP=$BASTION_IP" >> $GITHUB_ENV
              break
            fi
            echo "Attempt $i/30: bastion not yet visible, waiting 10s..."
            sleep 10
          done
          if [ -z "$BASTION_TS_IP" ]; then
            echo "ERROR: bastion k3s-prod-bastion not found in Tailscale after 5 minutes"
            tailscale status
            exit 1
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 10 -H $BASTION_TS_IP >> ~/.ssh/known_hosts 2>&1 || true

      - name: Test SSH to bastion
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 ubuntu@$BASTION_TS_IP "echo 'SSH OK via Tailscale'"

      - name: Generate inventory
        env:
          K3S_IP: ${{ github.event.inputs.k3s_master_ip }}
        run: |
          mkdir -p inventory
          PROXY="ssh -W %h:22 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new ubuntu@${BASTION_TS_IP}"
          {
            echo "all:"
            echo "  children:"
            echo "    bastion:"
            echo "      hosts:"
            echo "        k3s-prod-bastion:"
            echo "          ansible_host: ${BASTION_TS_IP}"
            echo "          ansible_user: ubuntu"
            echo "    k3s_masters:"
            echo "      hosts:"
            echo "        k3s-prod-master-1:"
            echo "          ansible_host: ${K3S_IP}"
            echo "          ansible_user: ubuntu"
            echo "          ansible_ssh_common_args: \"-o StrictHostKeyChecking=accept-new -o ProxyCommand='${PROXY}'\""
          } > inventory/hosts.yml
          cat inventory/hosts.yml

      - name: Install K3s
        run: ansible-playbook playbooks/k3s-install.yml

      - name: Configure cluster
        run: ansible-playbook playbooks/cluster-config.yml

      - name: Setup bastion (k9s + kubeconfig)
        run: ansible-playbook playbooks/bastion-setup.yml

      - name: Install ArgoCD
        run: ansible-playbook playbooks/argocd-install.yml
